<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contact | Mohammad Yasin</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    body {
      font-family: 'Inter', sans-serif;
      background: #0d001f;
      color: #e0e0ff;
      margin: 0;
      padding: 0;
      line-height: 1.7;
    }

    header {
      background: rgba(30,10,60,0.8);
      padding: 1rem 5%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(192,132,252,0.3);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo a {
      color: #c084fc;
      font-size: 1.8rem;
      font-weight: bold;
      text-decoration: none;
    }

    nav a {
      color: #d1d5ff;
      margin-left: 1.5rem;
      text-decoration: none;
    }

    .main-container {
      max-width: 900px;
      margin: 4rem auto;
      padding: 0 5%;
    }

    h1 {
      color: #c084fc;
      font-size: 2.8rem;
      text-align: center;
      margin-bottom: 3rem;
    }

    .contact-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 2rem;
      margin-bottom: 4rem;
    }

    .info-card {
      background: rgba(30,20,60,0.6);
      border-radius: 16px;
      padding: 2rem;
      text-align: center;
      border-left: 5px solid #c084fc;
      transition: transform 0.3s;
    }

    .info-card:hover {
      transform: translateY(-8px);
    }

    .info-icon {
      font-size: 2.5rem;
      color: #c084fc;
      margin-bottom: 1rem;
    }

    .info-card h3 {
      color: #e0aaff;
      font-size: 1.5rem;
      margin-bottom: 0.8rem;
    }

    .info-card p {
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
    }

    .info-card a {
      color: #c084fc;
      text-decoration: none;
      transition: color 0.3s;
    }

    .info-card a:hover {
      color: #e0aaff;
    }

    .contact-form {
      background: rgba(30,20,60,0.6);
      border-radius: 16px;
      padding: 2.5rem;
      border-left: 5px solid #c084fc;
      max-width: 600px;
      margin: 0 auto;
    }

    .contact-form h2 {
      color: #e0aaff;
      font-size: 1.8rem;
      margin-bottom: 1.5rem;
      text-align: center;
    }

    .contact-form label {
      display: block;
      font-size: 1.1rem;
      margin-bottom: 0.5rem;
      color: #b0b0ff;
    }

    .contact-form input, .contact-form textarea {
      width: 100%;
      padding: 1rem;
      margin-bottom: 1.5rem;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(192,132,252,0.3);
      border-radius: 8px;
      color: #e0e0ff;
      font-size: 1rem;
    }

    .contact-form button {
      width: 100%;
      background: #c084fc;
      color: white;
      padding: 1rem;
      border: none;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 8px 25px rgba(192,132,252,0.4);
    }

    .contact-form button:hover {
      background: #a05bf5;
      transform: translateY(-4px);
      box-shadow: 0 15px 40px rgba(192,132,252,0.5);
    }

    #form-message {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 1.1rem;
      padding: 1rem;
      border-radius: 8px;
      display: none;
    }

    .success {
      background: rgba(0,255,0,0.2);
      color: #0f0;
      border: 1px solid #0f0;
    }

    .error {
      background: rgba(255,0,0,0.2);
      color: #f00;
      border: 1px solid #f00;
    }

    @media (max-width: 768px) {
      .contact-info {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo"><a href="/">Yasin</a></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="blog.html">Blog</a>
      <a href="skills.html">Skills</a>
      <a href="projects.html">Projects</a>
      <a href="cv.html">CV</a>
    </nav>
  </header>

  <div class="main-container">
    <h1>Get in Touch</h1>

    <div class="contact-info">
      <div class="info-card">
        <i class="fas fa-envelope info-icon"></i>
        <h3>Email</h3>
        <p><a href="mailto:your.email@example.com">your.email@example.com</a></p>
      </div>

      <div class="info-card">
        <i class="fas fa-phone info-icon"></i>
        <h3>Phone</h3>
        <p>+880-XXXXXXXXXX</p>
      </div>

      <div class="info-card">
        <i class="fas fa-map-marker-alt info-icon"></i>
        <h3>Location</h3>
        <p>Dhaka, Bangladesh</p>
      </div>

      <div class="info-card">
        <i class="fas fa-globe info-icon"></i>
        <h3>Social</h3>
        <p>
          <a href="https://linkedin.com/in/yourprofile">LinkedIn</a> • 
          <a href="https://github.com/yourusername">GitHub</a>
        </p>
      </div>
    </div>

    <div class="contact-form">
      <h2>Send a Message</h2>
<form id="contact-form">
  <label for="name">Your Name</label>
  <input type="text" id="name" name="name" required placeholder="Enter your name">

  <label for="email">Your Email</label>
  <input type="email" id="email" name="email" required placeholder="Enter your email">

  <label for="message">Message</label>
  <textarea id="message" name="message" rows="6" required placeholder="Type your message here"></textarea>

  <button type="submit">Send Message</button>
</form>

      <div id="form-message"></div>
    </div>
  </div>

<script>
  document.getElementById('contact-form').addEventListener('submit', async function(e) {
    e.preventDefault();

    const formData = new FormData(this);
    const messageDiv = document.getElementById('form-message');
    messageDiv.style.display = 'block';
    messageDiv.textContent = 'Sending...';
    messageDiv.className = '';

    // ডেবাগ: কী পাঠানো হচ্ছে দেখা
    console.log('Form data entries:');
    for (let [key, value] of formData.entries()) {
      console.log(key + ': ' + value);
    }

    try {
      const response = await fetch('/api/send-email', {
        method: 'POST',
        body: formData,
        headers: {
          'Accept': 'application/json' // এটা যোগ করো
        }
      });

      const result = await response.json();

      if (response.ok) {
        messageDiv.textContent = result.message || 'Message sent successfully!';
        messageDiv.className = 'success';
        this.reset();
      } else {
        messageDiv.textContent = result.error || 'Failed to send message';
        messageDiv.className = 'error';
      }
    } catch (err) {
      messageDiv.textContent = 'Network error: ' + err.message;
      messageDiv.className = 'error';
      console.error('Fetch error:', err);
    }
  });
</script>

</body>
</html>
